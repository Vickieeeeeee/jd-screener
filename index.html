<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職缺雷達 · JD Screener</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFDF7;
    --card: #FFF9EE;
    --card2: #FFF5E4;
    --border: #EDE8DC;
    --border-hover: #D4C9B0;
    --text: #3D3530;
    --muted: #9B8E82;
    --dim: #C4B8AC;
    --coral: #FF8C69;
    --coral-bg: rgba(255,140,105,0.08);
    --coral-border: rgba(255,140,105,0.25);
    --green: #4CAF88;
    --green-bg: rgba(76,175,136,0.08);
    --green-border: rgba(76,175,136,0.25);
    --yellow: #F5A623;
    --yellow-bg: rgba(245,166,35,0.08);
    --yellow-border: rgba(245,166,35,0.25);
    --red: #E8524A;
    --red-bg: rgba(232,82,74,0.08);
    --red-border: rgba(232,82,74,0.25);
    --shadow: 0 2px 12px rgba(61,53,48,0.06);
    --shadow-hover: 0 4px 20px rgba(61,53,48,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--coral);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .topbar-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .topbar-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding: 2px 8px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .topbar-right {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--dim);
  }

  /* ── HERO ── */
  .hero {
    max-width: 680px;
    margin: 0 auto;
    padding: 44px 24px 32px;
    text-align: center;
  }

  .hero-compass {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    position: relative;
  }

  .compass-bg {
    width: 72px;
    height: 72px;
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .compass-glow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(255,140,105,0.15) 0%, transparent 70%);
    animation: glowPulse 2.5s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .compass-needle {
    font-size: 28px;
    animation: needleSpin 6s cubic-bezier(0.4,0,0.2,1) infinite;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 2px 4px rgba(255,140,105,0.3));
  }

  @keyframes needleSpin {
    0%   { transform: rotate(0deg); }
    20%  { transform: rotate(180deg); }
    40%  { transform: rotate(160deg); }
    60%  { transform: rotate(340deg); }
    80%  { transform: rotate(320deg); }
    100% { transform: rotate(360deg); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 10px;
  }

  h1 em {
    font-style: italic;
    color: var(--coral);
  }

  .hero-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 400px;
    margin: 0 auto;
  }

  /* ── MAIN ── */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── API KEY ── */
  .api-zone {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }

  .api-zone:focus-within {
    border-color: var(--coral-border);
  }

  .key-icon {
    font-size: 16px;
    flex-shrink: 0;
  }

  .api-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .api-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.04em;
  }

  .api-input::placeholder { color: var(--dim); }

  .api-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .api-pill.empty {
    color: var(--muted);
    background: var(--card2);
    border: 1px solid var(--border);
  }

  .api-pill.ready {
    color: var(--green);
    background: var(--green-bg);
    border: 1px solid var(--green-border);
  }

  /* ── JD INPUT ── */
  .input-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-card:focus-within {
    border-color: var(--coral-border);
    box-shadow: var(--shadow-hover);
  }

  .input-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--card2);
  }

  .input-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--dim);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    padding: 18px;
    min-height: 200px;
  }

  textarea::placeholder { color: var(--dim); }

  /* ── ACTIONS ── */
  .actions {
    display: flex;
    gap: 10px;
    margin-bottom: 36px;
  }

  .btn-scan {
    flex: 1;
    background: var(--coral);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 14px rgba(255,140,105,0.3);
    letter-spacing: 0.02em;
  }

  .btn-scan:hover:not(:disabled) {
    opacity: 0.92;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255,140,105,0.4);
  }

  .btn-scan:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-clear {
    background: var(--card);
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }

  .btn-clear:hover {
    color: var(--text);
    border-color: var(--border-hover);
    box-shadow: var(--shadow-hover);
  }

  /* ── SCANNING ── */
  .scanning-state {
    display: none;
    text-align: center;
    padding: 52px 24px;
  }

  .scanning-state.active { display: block; }

  .scan-compass {
    width: 64px;
    height: 64px;
    background: var(--card2);
    border: 2px solid var(--coral-border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    position: relative;
    box-shadow: 0 0 0 8px var(--coral-bg);
    animation: scanPulse 1.5s ease-in-out infinite;
  }

  @keyframes scanPulse {
    0%, 100% { box-shadow: 0 0 0 4px var(--coral-bg); }
    50% { box-shadow: 0 0 0 12px rgba(255,140,105,0.04); }
  }

  .scan-compass span {
    font-size: 26px;
    animation: needleSpin 1.5s cubic-bezier(0.4,0,0.2,1) infinite;
  }

  .scan-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    animation: fadeOsc 1.5s ease-in-out infinite;
  }

  @keyframes fadeOsc {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* ── ERROR ── */
  .error-card {
    background: var(--red-bg);
    border: 1.5px solid var(--red-border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 13px;
    color: var(--red);
    display: none;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .error-card.active { display: block; }

  /* ── RESULTS ── */
  .result-zone { display: none; }
  .result-zone.active { display: block; }

  /* Verdict */
  .verdict-card {
    border-radius: 16px;
    padding: 22px 22px;
    margin-bottom: 18px;
    border: 1.5px solid;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    box-shadow: var(--shadow);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .verdict-card.GREEN { background: var(--green-bg); border-color: var(--green-border); }
  .verdict-card.YELLOW { background: var(--yellow-bg); border-color: var(--yellow-border); }
  .verdict-card.RED { background: var(--red-bg); border-color: var(--red-border); }

  .verdict-emoji { font-size: 32px; flex-shrink: 0; line-height: 1; margin-top: 2px; }

  .verdict-body { flex: 1; }

  .verdict-chip {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
  }

  .GREEN .verdict-chip { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .YELLOW .verdict-chip { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .RED .verdict-chip { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  .verdict-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .GREEN .verdict-title { color: var(--green); }
  .YELLOW .verdict-title { color: var(--yellow); }
  .RED .verdict-title { color: var(--red); }

  .verdict-reason {
    font-size: 14px;
    color: var(--text);
    line-height: 1.65;
    opacity: 0.85;
  }

  /* Section headers */
  .sec-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 24px 0 12px;
  }

  .sec-chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--card2);
    color: var(--muted);
    border: 1px solid var(--border);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .sec-title {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  /* Flags */
  .flags-list { display: flex; flex-direction: column; gap: 8px; }

  .flag-item {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }

  .flag-item:hover { box-shadow: var(--shadow-hover); }
  .flag-item.flag-GREEN { border-left: 4px solid var(--green); }
  .flag-item.flag-YELLOW { border-left: 4px solid var(--yellow); }
  .flag-item.flag-RED { border-left: 4px solid var(--red); }

  .flag-badge {
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .flag-body { flex: 1; }

  .flag-word {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .flag-GREEN .flag-word { color: var(--green); }
  .flag-YELLOW .flag-word { color: var(--yellow); }
  .flag-RED .flag-word { color: var(--red); }

  .flag-context {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-style: italic;
    line-height: 1.5;
    background: var(--card2);
    padding: 4px 10px;
    border-radius: 6px;
    display: inline-block;
  }

  .flag-judgment {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    opacity: 0.8;
    margin-top: 5px;
  }

  /* Industry */
  .industry-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: var(--shadow);
  }

  .ind-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .ind-badge.LOW { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .ind-badge.MEDIUM { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .ind-badge.HIGH { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  .ind-note { font-size: 13px; color: var(--text); line-height: 1.65; opacity: 0.8; }

  /* Questions */
  .questions-list { display: flex; flex-direction: column; gap: 8px; }

  .question-item {
    background: var(--yellow-bg);
    border: 1.5px solid var(--yellow-border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--yellow);
    flex-shrink: 0;
    background: rgba(245,166,35,0.12);
    padding: 2px 7px;
    border-radius: 6px;
    margin-top: 1px;
  }

  .q-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.65;
  }

  /* Empty */
  .empty-notice {
    text-align: center;
    padding: 20px;
    font-size: 13px;
    color: var(--dim);
    font-style: italic;
  }

  /* Footer */
  .footer {
    max-width: 680px;
    margin: 40px auto 0;
    padding: 20px 24px 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .footer-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.08em;
  }

  .footer-note {
    font-size: 11px;
    color: var(--dim);
    font-style: italic;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">🧭</div>
    <span class="topbar-name">職缺雷達</span>
    <span class="topbar-tag">JD Screener</span>
  </div>
  <span class="topbar-right">Vickie 專用 · v1.0</span>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-compass">
    <div class="compass-bg">
      <div class="compass-glow"></div>
      <div class="compass-needle">🧭</div>
    </div>
  </div>
  <h1>貼入 JD，<em>雷達幫你看</em></h1>
  <p class="hero-desc">把職缺說明全文貼進來，自動偵測紅旗詞、判斷這份職缺值不值得你花時間投。</p>
</div>

<div class="main">

  <!-- API KEY -->
  <div class="api-zone">
    <span class="key-icon">🔑</span>
    <span class="api-label">Gemini Key</span>
    <input
      class="api-input"
      type="password"
      id="apiKey"
      placeholder="貼上你的 Gemini API Key（AIza...）"
      autocomplete="off"
      oninput="onKeyInput()"
    />
    <span class="api-pill empty" id="apiStatus">未輸入</span>
  </div>

  <!-- JD INPUT -->
  <div class="input-card">
    <div class="input-topbar">
      <span class="input-label">📋 職缺說明 JD</span>
      <span class="char-count" id="charCount">0 字</span>
    </div>
    <textarea
      id="jdText"
      placeholder="把 104 或任何平台上的職缺說明全部貼進來～&#10;職位名稱、工作內容、職責要求通通貼上，越完整越準確！"
      oninput="onJdInput()"
    ></textarea>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn-scan" id="scanBtn" onclick="startScan()" disabled>
      <span id="btnText">🧭 開始掃描</span>
    </button>
    <button class="btn-clear" onclick="clearAll()">清除</button>
  </div>

  <!-- ERROR -->
  <div class="error-card" id="errorCard"></div>

  <!-- SCANNING -->
  <div class="scanning-state" id="scanningState">
    <div class="scan-compass"><span>🧭</span></div>
    <div class="scan-label">掃描中，請稍候...</div>
  </div>

  <!-- RESULTS -->
  <div class="result-zone" id="resultZone"></div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-left">
    <span style="font-size:14px">🧭</span>
    <span class="footer-text">職缺雷達 · JD Screener v1.0</span>
  </div>
  <span class="footer-note">API Key 僅存在此 Session，關掉就消失 ✦</span>
</div>

<script>
  let apiKey = '';
  let jdText = '';

  function onKeyInput() {
    apiKey = document.getElementById('apiKey').value.trim();
    const status = document.getElementById('apiStatus');
    if (apiKey.length > 10) {
      status.textContent = '已就緒 ✓';
      status.className = 'api-pill ready';
    } else {
      status.textContent = '未輸入';
      status.className = 'api-pill empty';
    }
    updateBtn();
  }

  function onJdInput() {
    jdText = document.getElementById('jdText').value;
    document.getElementById('charCount').textContent = jdText.length + ' 字';
    updateBtn();
  }

  function updateBtn() {
    document.getElementById('scanBtn').disabled = !(apiKey.length > 10 && jdText.length >= 50);
  }

  function clearAll() {
    document.getElementById('jdText').value = '';
    jdText = '';
    document.getElementById('charCount').textContent = '0 字';
    document.getElementById('resultZone').className = 'result-zone';
    document.getElementById('resultZone').innerHTML = '';
    document.getElementById('errorCard').className = 'error-card';
    document.getElementById('scanningState').className = 'scanning-state';
    updateBtn();
  }

  async function startScan() {
    document.getElementById('errorCard').className = 'error-card';
    document.getElementById('resultZone').className = 'result-zone';
    document.getElementById('resultZone').innerHTML = '';
    document.getElementById('scanningState').className = 'scanning-state active';
    document.getElementById('scanBtn').disabled = true;
    document.getElementById('btnText').textContent = '掃描中...';

    const prompt = `你是一個協助台灣行銷求職者篩選 JD 的分析工具。

求職者 Vickie 的條件：
- 目標：純行銷職位（數位/成效型行銷優先，品牌行銷為次）
- 底線：不接受「一對一說服終端客戶完成購買」的職位
- 可接受：量化行銷 KPI、多工職責、小團隊、接觸用戶
- 不接受：個人業績配額、BD開發、諮詢顧問銷售

紅旗詞（直接 RED）：顧問、諮詢、開發客戶、達成業績目標、負責完整銷售流程、業務開發、BD
黃旗詞（看上下文）：業績目標、CRM、客戶關係、Sales & Marketing、轉換率、業務
綠燈詞（加分）：廣告投放、成效優化、活動企劃、行銷自動化、品牌曝光、EDM、KOL、漏斗優化、數位行銷

高風險產業：教育訓練實體課程、保險、房地產、醫美健身
中風險：金融理財
低風險：電商、SaaS、媒體、廣告代理

請分析以下 JD，只輸出 JSON，不要其他文字或 markdown：

{
  "verdict": "GREEN或YELLOW或RED",
  "verdict_reason": "一句話說明（繁體中文）",
  "flags": [
    {
      "word": "觸發詞",
      "level": "GREEN或YELLOW或RED",
      "context": "原文片段20字以內",
      "judgment": "判斷說明30字以內（繁體中文）"
    }
  ],
  "industry_risk": "LOW或MEDIUM或HIGH",
  "industry_note": "產業風險說明（繁體中文）",
  "clarify_questions": ["YELLOW時列2-3個問HR的問題，否則空陣列"]
}

JD 內容：
${jdText}`;

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.2, maxOutputTokens: 1500 }
          })
        }
      );

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || `API 錯誤 (${res.status})`);
      }

      const data = await res.json();
      let raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      raw = raw.replace(/```json/g, '').replace(/```/g, '').trim();

      let result;
      try { result = JSON.parse(raw); }
      catch(e) { throw new Error('分析結果格式異常，請再試一次'); }

      renderResult(result);

    } catch(err) {
      const ec = document.getElementById('errorCard');
      ec.textContent = '⚠️ ' + err.message;
      ec.className = 'error-card active';
    } finally {
      document.getElementById('scanningState').className = 'scanning-state';
      document.getElementById('scanBtn').disabled = false;
      document.getElementById('btnText').textContent = '🧭 開始掃描';
      updateBtn();
    }
  }

  function renderResult(r) {
    const zone = document.getElementById('resultZone');
    zone.innerHTML = '';

    const vMap = {
      GREEN:  { emoji: '✅', chip: '可以投', title: '這份職缺看起來安全！' },
      YELLOW: { emoji: '🔍', chip: '需要確認', title: '有幾個地方值得先問清楚' },
      RED:    { emoji: '🚨', chip: '跳過', title: '偵測到業務性質職責' }
    };
    const v = vMap[r.verdict] || vMap['YELLOW'];

    // Verdict
    const vc = document.createElement('div');
    vc.className = `verdict-card ${r.verdict}`;
    vc.innerHTML = `
      <div class="verdict-emoji">${v.emoji}</div>
      <div class="verdict-body">
        <span class="verdict-chip">${v.chip}</span>
        <div class="verdict-title">${v.title}</div>
        <div class="verdict-reason">${r.verdict_reason || ''}</div>
      </div>
    `;
    zone.appendChild(vc);

    // Flags
    const fh = document.createElement('div');
    fh.className = 'sec-head';
    fh.innerHTML = `<span class="sec-chip">掃描結果</span><span class="sec-title">偵測到的關鍵詞</span>`;
    zone.appendChild(fh);

    const fl = document.createElement('div');
    fl.className = 'flags-list';

    if (!r.flags || r.flags.length === 0) {
      fl.innerHTML = '<div class="empty-notice">未偵測到特殊關鍵詞</div>';
    } else {
      const order = { RED: 0, YELLOW: 1, GREEN: 2 };
      const sorted = [...r.flags].sort((a,b) => (order[a.level]||1)-(order[b.level]||1));
      const flagEmoji = { GREEN: '✦', YELLOW: '◈', RED: '⊗' };
      sorted.forEach(flag => {
        const item = document.createElement('div');
        item.className = `flag-item flag-${flag.level}`;
        item.innerHTML = `
          <span class="flag-badge">${flagEmoji[flag.level]||'·'}</span>
          <div class="flag-body">
            <div class="flag-word">${flag.word}</div>
            ${flag.context ? `<span class="flag-context">「${flag.context}」</span>` : ''}
            <div class="flag-judgment">${flag.judgment}</div>
          </div>
        `;
        fl.appendChild(item);
      });
    }
    zone.appendChild(fl);

    // Industry
    if (r.industry_note) {
      const ih = document.createElement('div');
      ih.className = 'sec-head';
      ih.innerHTML = `<span class="sec-chip">產業評估</span><span class="sec-title">結構性風險</span>`;
      zone.appendChild(ih);

      const ic = document.createElement('div');
      ic.className = 'industry-card';
      const riskLabel = { LOW: '低風險 🟢', MEDIUM: '中風險 🟡', HIGH: '高風險 🔴' };
      ic.innerHTML = `
        <span class="ind-badge ${r.industry_risk}">${riskLabel[r.industry_risk]||r.industry_risk}</span>
        <span class="ind-note">${r.industry_note}</span>
      `;
      zone.appendChild(ic);
    }

    // Questions
    if (r.clarify_questions && r.clarify_questions.length > 0) {
      const qh = document.createElement('div');
      qh.className = 'sec-head';
      qh.innerHTML = `<span class="sec-chip">面試前確認</span><span class="sec-title">可以先問 HR 的問題</span>`;
      zone.appendChild(qh);

      const ql = document.createElement('div');
      ql.className = 'questions-list';
      r.clarify_questions.forEach((q, i) => {
        const item = document.createElement('div');
        item.className = 'question-item';
        item.innerHTML = `<span class="q-num">Q${i+1}</span><span class="q-text">${q}</span>`;
        ql.appendChild(item);
      });
      zone.appendChild(ql);
    }

    zone.className = 'result-zone active';
    setTimeout(() => zone.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
</script>
</body>
